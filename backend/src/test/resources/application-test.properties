# Test profile: an in-memory H2 database so the full application context can boot
# without Postgres or Docker. Activated via @ActiveProfiles("test"). These values
# override the corresponding keys in the base application.properties for tests only.

spring.datasource.url=jdbc:h2:mem:ticklist;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# Rebuild the schema from the JPA entities for each test run, then drop it.
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Throwaway signing secret for tests only (>= 32 bytes, required by HMAC-SHA256).
# This is NOT a real credential and is never used outside the test profile.
security.jwt.secret=test-only-jwt-signing-secret-at-least-32-bytes-long
security.jwt.expiration-ms=3600000
